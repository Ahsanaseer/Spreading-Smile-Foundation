<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="Picrures All/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="contact.css">
    <title>Spreading Smile Foundation</title>     
</head>



<body>
    
    <div data-include="navbar.html"></div>



    <!-- Contact Section Start -->
     <div class="contact-main-container" >
     <div class="contact-page-heading">
            <h1>Contact Us</h1>
        </div>
    <div class="container">
        <div class="contact-image-side">
            <img src="Picrures All/contactimg.png" class="contact-main-img" alt="Your image" />
        </div>
        <div class="contact-form-side">
            <form class="contact-form" id="contactForm" method="POST">
                <input type="text" class="contact-input" name="name" placeholder="Your Name" required>
                <input type="email" class="contact-input" name="email" placeholder="Email Address" required>
                <textarea class="contact-input contact-message" name="message" placeholder="Type Your Message..." required></textarea>
                <button type="submit" class="send-msg-btn"><span>Send a message</span></button>
            </form>
        </div>
    </div>
     </div>
    <!-- Contact Section End -->
































    <div data-include="footer.html"></div>




  <!-- Toast Notification -->
  <div id="toast" class="toast" style="display: none;">
    <div class="toast-content" id="toast-message">
      Message Sent Successfully.
    </div>
    <div class="toast-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0h24v24H0z" fill="none"></path>
        <path d="M15.795 8.342l-5.909 9.545a1 1 0 0 1-1.628 0l-3.182-4.909a1 1 0 0 1 1.629-1.165l2.556 3.953L14.165 7.51a1 1 0 0 1 1.63 1.165z"></path>
      </svg>
    </div>
  </div>

  <script src="contact.js"></script>
  <script src="include.js"></script>
  <script src="navbar.js"></script>
  <script src="footer.js"></script>
</body>
</html>
