<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firebase Bike Form</title>
  <style>
    .form {
      background-color: #fff;
      display: block;
      padding: 1rem;
      max-width: 350px;
      border-radius: 0.5rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      text-align: center;
      margin: 0 auto;
      margin-top: 50px;
    }
    .form-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #000;
    }
    .input-container {
      position: relative;
    }
    .input-container input {
      width: 300px;
      padding: 1rem;
      margin: 8px 0;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
    }
    .submit {
      padding: 0.75rem;
      background-color: #4F46E5;
      color: white;
      font-weight: 500;
      border-radius: 0.5rem;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<!-- Create Form -->
<form class="form" id="signupForm">
  <p class="form-title">Create a new bike</p>
  <div class="input-container">
    <input type="text" id="bikeName" placeholder="Enter your bike name" required />
  </div>
  <div class="input-container">
    <input type="text" id="bikeModel" placeholder="Enter your bike model" required />
  </div>
  <div class="input-container">
    <input type="text" id="bikeColour" placeholder="Enter your bike colour" required />
  </div>
  <button class="submit" type="submit" id="createBtn">Create</button>
</form>

<!-- Read Form -->
<form class="form" id="readForm">
  <p class="form-title">Read a bike by ID</p>
  <div class="input-container">
    <input type="text" id="bikeId" placeholder="Enter document ID" required />
  </div>
  <button class="submit" type="submit" id="readBtn">Read</button>
</form>

<!-- 🔥 Firebase Scripts -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAYhGICjQtr_QQJ1W4QvxzALZ-RhOTjusU",
    authDomain: "my-login-page-001.firebaseapp.com",
    projectId: "my-login-page-001",
    storageBucket: "my-login-page-001.appspot.com",
    messagingSenderId: "793763922031",
    appId: "1:793763922031:web:3201bc0083eb029b028d9a",
    measurementId: "G-7JXZMJG3KM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const createForm = document.getElementById("signupForm");
  const readForm = document.getElementById("readForm");

  // CREATE bike
  createForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    const name = document.getElementById("bikeName").value;
    const model = document.getElementById("bikeModel").value;
    const colour = document.getElementById("bikeColour").value;

    try {
      const docRef = await addDoc(collection(db, "BikeAll"), {
        name,
        model,
        colour,
        createdAt: new Date()
      });

      alert("Bike added successfully! Document ID: " + docRef.id);
      createForm.reset();
    } catch (error) {
      alert("Error adding bike: " + error.message);
    }
  });

  // READ bike
  readForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    const bikeId = document.getElementById("bikeId").value.trim();

    try {
      const docRef = doc(db, "BikeAll", bikeId);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const data = docSnap.data();
        alert(`Bike Found:\nName: ${data.name}\nModel: ${data.model}\nColour: ${data.colour}`);
        console.log("Bike Data:", data);
      } else {
        alert("No such bike found!");
      }
    } catch (error) {
      alert("Error reading bike: " + error.message);
    }
  });
</script>

</body>
</html>
