<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="Picrures All/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/ourTeam.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Our Team - Spreading Smile Foundation</title>
    <script src="js/components.js"></script>
    <script src="js/animations.js"></script>
</head>

<body>
    <div id="nav-container"></div>
    
    <div class="main-content">
        <!-- Our Team Section Start -->
        <section class="our-team-section">
            <div class="our-team-container">
                <div class="our-team-header">
                    <h1 class="our-team-title" data-animate="true" data-animation="fadeInUp">Our Amazing Team</h1>
                    <p class="our-team-subtitle" data-animate="true" data-animation="fadeInUp" data-delay="100">
                        Meet the dedicated individuals who make our mission possible
                    </p>
                </div>

                <!-- Loader Container -->
                <div class="loader-container" id="team-loader-container">
                    <div class="loader" id="team-loader"></div>
                    <p class="loading-text">Loading team members...</p>
                </div>

                <!-- Dynamic Team Grid -->
                <div class="team-grid" id="team-grid-container" data-animate="true" data-animation="fadeInUp" data-delay="200" style="display: none;">
                    <!-- Team member cards will be dynamically inserted here -->
                </div>
            </div>
        </section>
        <!-- Our Team Section End -->

        <div id="footer-container"></div>
        <div id="modal-container"></div>
    </div>

    <script type="module" src="js/ourTeam.js"></script>
</body>
</html>
